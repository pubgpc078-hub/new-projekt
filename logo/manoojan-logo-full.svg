<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="منوجان کالا — فروشگاه لوازم خانگی">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c95c"/>
      <stop offset=".5" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#9a7b14"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2026"/>
      <stop offset="1" stop-color="#0f1317"/>
    </linearGradient>
    <radialGradient id="glow" cx=".78" cy=".15" r=".7">
      <stop offset="0" stop-color="#c9a227" stop-opacity=".35"/>
      <stop offset="1" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ─── آیکون (سمت راست، چیدمان راست‌چین) ─── -->
  <g transform="translate(650,25)">
    <rect width="250" height="250" rx="58" fill="url(#darkGrad)"/>
    <rect width="250" height="250" rx="58" fill="url(#glow)"/>
    <rect x="1.5" y="1.5" width="247" height="247" rx="57" fill="none" stroke="url(#goldGrad)" stroke-opacity=".45" stroke-width="3"/>
    <g fill="none" stroke="url(#goldGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
      <path d="M57 115 L125 57 L193 115"/>
      <path d="M74 131 L74 193 L176 193 L176 131"/>
    </g>
    <rect x="160" y="68" width="15" height="26" rx="5" fill="url(#goldGrad)"/>
    <text x="125" y="177" text-anchor="middle" font-family="Vazirmatn, 'Segoe UI', Tahoma, sans-serif" font-size="74" font-weight="800" fill="url(#goldGrad)">م</text>
    <path d="M125 25 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 z" fill="#e9c95c"/>
  </g>

  <!-- ─── نوشته ─── -->
  <text x="610" y="150" text-anchor="end" direction="rtl" font-family="Vazirmatn, 'Segoe UI', Tahoma, sans-serif" font-size="88" font-weight="900" fill="#14181d">منوجان کالا</text>
  <line x1="330" y1="182" x2="610" y2="182" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
  <text x="610" y="222" text-anchor="end" direction="rtl" font-family="Vazirmatn, 'Segoe UI', Tahoma, sans-serif" font-size="30" font-weight="500" fill="#8a919b">فروشگاه تخصصی لوازم خانگی</text>
  <text x="610" y="258" text-anchor="end" font-family="'Segoe UI', Tahoma, sans-serif" font-size="19" font-weight="600" letter-spacing="6" fill="#c9a227">MANOOJAN KALA</text>
</svg>
