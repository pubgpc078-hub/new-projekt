<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="لوگوی منوجان کالا">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c95c"/>
      <stop offset=".5" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#9a7b14"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2026"/>
      <stop offset="1" stop-color="#0f1317"/>
    </linearGradient>
    <radialGradient id="glow" cx=".78" cy=".15" r=".7">
      <stop offset="0" stop-color="#c9a227" stop-opacity=".35"/>
      <stop offset="1" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- کاشی پس‌زمینه -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#darkGrad)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#glow)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#goldGrad)" stroke-opacity=".45" stroke-width="3"/>

  <!-- خانه: سقف و بدنه با خطوط طلایی -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <!-- سقف -->
    <path d="M116 236 L256 116 L396 236"/>
    <!-- بدنه خانه (باز از بالا) -->
    <path d="M152 268 L152 396 L360 396 L360 268"/>
  </g>

  <!-- دودکش -->
  <rect x="330" y="140" width="30" height="52" rx="10" fill="url(#goldGrad)"/>

  <!-- حرف «م» در قلب خانه -->
  <text x="256" y="362" text-anchor="middle" font-family="Vazirmatn, 'Segoe UI', Tahoma, sans-serif" font-size="150" font-weight="800" fill="url(#goldGrad)">م</text>

  <!-- جرقهٔ ستاره‌ای بالای سقف -->
  <path d="M256 52 l7 20 20 7 -20 7 -7 20 -7 -20 -20 -7 20 -7 z" fill="#e9c95c"/>
</svg>
